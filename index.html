<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora Regla de 3 - Monitor/TV a Tablet</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      max-width: 540px;
      margin: 30px auto;
      padding: 20px;
      background: #f8f9fa;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 8px;
    }
    .lang-selector {
      text-align: right;
      margin-bottom: 16px;
    }
    .lang-selector select {
      padding: 6px 10px;
      font-size: 0.95em;
      border-radius: 6px;
      border: 1px solid #bdc3c7;
      background: white;
      cursor: pointer;
    }
    .container {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 20px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #34495e;
    }
    input[type="number"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #bdc3c7;
      border-radius: 6px;
      font-size: 16px;
      box-sizing: border-box;
    }
    input[type="number"]:focus {
      outline: none;
      border-color: #3498db;
      box-shadow: 0 0 0 3px rgba(52,152,219,0.15);
    }
    button {
      grid-column: 1 / -1;
      margin-top: 20px;
      padding: 14px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 17px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #2980b9;
    }
    #resultado {
      margin-top: 28px;
      padding: 18px;
      background: #ecf0f1;
      border-radius: 8px;
      font-size: 1.1em;
      min-height: 60px;
      white-space: pre-wrap;
    }
    #resultado strong {
      color: #e74c3c;
    }
    .copy-container {
      margin-top: 12px;
      text-align: right;
    }
    .copy-btn {
      padding: 6px 14px;
      background: #7f8c8d;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9em;
    }
    .copy-btn:hover {
      background: #95a5a6;
    }
  </style>
</head>
<body>

  <div class="lang-selector">
    <select id="languageSelect" onchange="cambiarIdioma(this.value)">
      <option value="es">Español</option>
      <option value="en">English</option>
      <option value="pt">Português</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
      <option value="it">Italiano</option>
      <option value="nl">Nederlands</option>
      <option value="pl">Polski</option>
      <option value="ru">Русский</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
      <option value="zh">中文</option>
      <option value="ar">العربية</option>
    </select>
  </div>

  <h1 id="titulo">Calculadora Regla de 3<br>Monitor/TV → Tablet</h1>

  <div class="container">
    <div class="grid">

      <div>
        <label id="lbl_d_x">Monitor/TV ancho (mm)</label>
        <input type="number" id="d_x" value="597.89" step="0.1">
      </div>

      <div>
        <label id="lbl_t_x">Tablet ancho (mm)</label>
        <input type="number" id="t_x" value="254" step="0.1">
      </div>

      <div>
        <label id="lbl_d_y">Monitor/TV alto (mm)</label>
        <input type="number" id="d_y" value="336.31" step="0.1">
      </div>

      <div>
        <label id="lbl_t_y">Tablet alto (mm)</label>
        <input type="number" id="t_y" value="159" step="0.1">
      </div>

      <div>
        <label id="lbl_p_x">Monitor/TV resolución X (px)</label>
        <input type="number" id="p_x" value="1920">
      </div>

      <div>
        <label id="lbl_p_y">Monitor/TV resolución Y (px)</label>
        <input type="number" id="p_y" value="1080">
      </div>

    </div>

    <button id="btnCalcular" onclick="calcular()">Calcular píxeles en la tablet</button>

    <div id="resultado"></div>

    <div class="copy-container">
      <button class="copy-btn" onclick="copiarResultado()" id="btnCopiar" style="display:none;">
        <span id="txtCopiar">Copiar resultado</span>
      </button>
    </div>
  </div>

        lbl_d_x: "Монитор/TV ширина (мм)",

    let idiomaActual = "es";

    function cambiarIdioma(idioma) {
      if (!traducciones[idioma]) return;
      idiomaActual = idioma;
      const t = traducciones[idioma];

      document.getElementById("titulo").innerHTML = t.titulo;
      document.getElementById("lbl_d_x").textContent = t.lbl_d_x;
      document.getElementById("lbl_t_x").textContent = t.lbl_t_x;
      document.getElementById("lbl_d_y").textContent = t.lbl_d_y;
      document.getElementById("lbl_t_y").textContent = t.lbl_t_y;
      document.getElementById("lbl_p_x").textContent = t.lbl_p_x;
      document.getElementById("lbl_p_y").textContent = t.lbl_p_y;
      document.getElementById("btnCalcular").textContent = t.btnCalcular;
      document.getElementById("txtCopiar").textContent = t.txtCopiar;

      // También traducimos el resultado si ya existe
      if (window.ultimoResultadoRaw) {
        mostrarResultado(window.ultimoResultadoRaw);
      }
    }

    function mostrarResultado(data) {
      const t = traducciones[idiomaActual];

      const texto = 
`${t.resultadoTitulo}

→ ${data.px_x} × ${data.px_y} píxeles

Cálculo:
${t.calculoX} ( ${data.p_x} × ${data.t_x} ) / ${data.d_x}  ≈ ${data.px_x}
${t.calculoY} ( ${data.p_y} × ${data.t_y} ) / ${data.d_y}  ≈ ${data.px_y}`;

      document.getElementById('resultado').textContent = texto;
      document.getElementById('btnCopiar').style.display = 'inline-block';
      
      window.ultimoResultado = texto;           // para copiar
      window.ultimoResultadoRaw = data;         // para poder retraducir
    }

    function calcular() {
      const d_x = parseFloat(document.getElementById('d_x').value) || 0;
      const d_y = parseFloat(document.getElementById('d_y').value) || 0;
      const p_x = parseFloat(document.getElementById('p_x').value) || 0;
      const p_y = parseFloat(document.getElementById('p_y').value) || 0;
      const t_x = parseFloat(document.getElementById('t_x').value) || 0;
      const t_y = parseFloat(document.getElementById('t_y').value) || 0;

      if (d_x === 0 || t_x === 0 || p_x === 0) {
        const t = traducciones[idiomaActual];
        document.getElementById('resultado').innerHTML = 
          `<span style="color:#e74c3c">${t.error}</span>`;
        document.getElementById('btnCopiar').style.display = 'none';
        return;
      }

      const px_x = Math.round((p_x * t_x) / d_x);
      const px_y = Math.round((p_y * t_y) / d_y);

      const data = { d_x, t_x, p_x, px_x, d_y, t_y, p_y, px_y };
      mostrarResultado(data);
    }

    function copiarResultado() {
      if (!window.ultimoResultado) return;
      
      navigator.clipboard.writeText(window.ultimoResultado)
        .then(() => {
          const btn = document.getElementById('btnCopiar');
          const textoOriginal = btn.textContent;
          btn.textContent = idiomaActual === "en" ? "Copied!" : 
                           idiomaActual === "pt" ? "Copiado!" : 
                           "¡Copiado!";
          btn.style.background = "#27ae60";
          setTimeout(() => {
            btn.textContent = textoOriginal;
            btn.style.background = "#7f8c8d";
          }, 1800);
        })
        .catch(() => {
          alert("No se pudo copiar automáticamente.\n\nCopia manualmente el texto.");
        });
    }

    // Inicializamos en español
    cambiarIdioma("es");
  </script>

</body>
</html>
